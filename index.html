<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Whack-A-Family">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">
<title>Whack-A-Family</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{min-height:100vh;background:linear-gradient(135deg,#ff6b9d,#ff8e53,#ffd93d,#6bcb77,#4d96ff);background-size:400% 400%;animation:gradShift 8s ease infinite;font-family:Georgia,serif;overflow-x:hidden;touch-action:manipulation;}
@keyframes gradShift{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
.hearts-bg{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;overflow:hidden;}
.heart-float{position:absolute;animation:floatUp linear infinite;opacity:0.35;pointer-events:none;}
@keyframes floatUp{0%{transform:translateY(110vh) rotate(0deg)}100%{transform:translateY(-10vh) rotate(360deg);opacity:0}}
.wrap{position:relative;z-index:1;max-width:860px;margin:0 auto;padding:8px 10px;}
h1.title{font-family:Impact,sans-serif;font-size:clamp(2.4rem,9vw,5rem);color:#fff;text-shadow:3px 3px 0 #e91e8c,5px 5px 0 #880e4f;text-align:center;letter-spacing:3px;line-height:1;padding-top:10px;}
.subtitle{text-align:center;font-size:clamp(.9rem,3vw,1.3rem);color:#fff9c4;margin:4px 0 8px;}
.scoreboard{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin:6px 0;}
.sc{background:rgba(255,255,255,.92);border-radius:14px;padding:6px 16px;text-align:center;min-width:90px;box-shadow:0 3px 12px rgba(0,0,0,.2);border:2px solid #fff;}
.sc-lbl{font-size:.68rem;color:#999;text-transform:uppercase;letter-spacing:1px;}
.sc-val{font-family:Impact,sans-serif;font-size:1.7rem;line-height:1.1;color:#e91e8c;}
.sc-val.money{color:#2e7d32;font-size:1.5rem;}.sc-val.timer{color:#e65100;}.sc-val.goal{color:#7b1fa2;}
.legend{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin:5px 0;}
.leg{background:rgba(255,255,255,.88);border-radius:20px;padding:3px 10px;font-size:.8rem;color:#333;display:flex;align-items:center;gap:5px;box-shadow:0 2px 6px rgba(0,0,0,.15);}
.leg-dot{width:26px;height:26px;border-radius:50%;overflow:hidden;border:2px solid #fff;flex-shrink:0;}
.leg-dot img{width:100%;height:100%;object-fit:cover;}
.controls{text-align:center;margin:8px 0 4px;}
.btn{font-family:Impact,sans-serif;font-size:1.3rem;letter-spacing:2px;padding:9px 26px;border:none;border-radius:50px;cursor:pointer;box-shadow:0 4px 0 rgba(0,0,0,.3);margin:0 4px;transition:transform .1s;}
.btn:active{transform:translateY(3px);box-shadow:0 1px 0 rgba(0,0,0,.3);}
.btn-go{background:#ffd700;color:#333;}.btn-re{background:#ff6b9d;color:#fff;}
.grass{text-align:center;font-size:1.3rem;margin:4px 0;}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;padding:6px 4px;max-width:680px;margin:0 auto;}
.hole-c{display:flex;flex-direction:column;align-items:center;position:relative;min-height:160px;}
.head{width:110px;height:110px;position:relative;z-index:5;cursor:pointer;transform-origin:bottom center;margin-bottom:-4px;user-select:none;}
.head img{width:100%;height:100%;object-fit:cover;border-radius:50%;border:3px solid #fff;box-shadow:0 4px 12px rgba(0,0,0,.4);pointer-events:none;display:block;}
.head .badge{position:absolute;top:-6px;right:-6px;background:#ffd700;color:#333;font-family:Impact,sans-serif;font-size:.85rem;padding:1px 6px;border-radius:9px;border:2px solid #fff;pointer-events:none;}
.head.gone{display:none;}
.head.up{animation:riseUp .28s ease-out forwards;}
.head.smacked{animation:flatten .32s ease-in forwards;}
@keyframes riseUp{0%{transform:translateY(55px) scaleY(.15);opacity:.4}65%{transform:translateY(-6px) scaleY(1.06)}100%{transform:translateY(0) scaleY(1);opacity:1}}
@keyframes flatten{0%{transform:scaleY(1)}30%{transform:scaleY(.15) scaleX(1.7) translateY(38px)}70%{transform:scaleY(.03) scaleX(1.9) translateY(52px)}100%{transform:scaleY(0) scaleX(2) translateY(58px);opacity:0}}
.flash{position:absolute;top:40%;left:50%;transform:translate(-50%,-50%);font-family:Impact,sans-serif;font-size:1.8rem;color:#ffd700;text-shadow:2px 2px 0 #e91e8c;pointer-events:none;z-index:10;white-space:nowrap;}
.flash.pop{animation:hitpop .55s ease-out forwards;}
@keyframes hitpop{0%{transform:translate(-50%,-50%) scale(.4);opacity:1}55%{transform:translate(-50%,-90%) scale(1.3);opacity:1}100%{transform:translate(-50%,-130%) scale(1);opacity:0}}
.hole-ring{width:112px;height:46px;background:radial-gradient(ellipse at 50% 30%,#5d4037,#3e2723 60%,#1a0f0a);border-radius:50%;box-shadow:inset 0 8px 18px rgba(0,0,0,.8),0 3px 0 #8d6e63;position:relative;z-index:3;display:flex;align-items:center;justify-content:center;}
.hole-inner{width:72px;height:26px;background:radial-gradient(ellipse,#0d0907,#1a0f0a 70%);border-radius:50%;}
.hole-shadow{width:100px;height:36px;background:radial-gradient(ellipse,rgba(0,0,0,.55),transparent 70%);border-radius:50%;margin-top:-8px;z-index:2;}
.celebrate{display:none;position:fixed;inset:0;background:rgba(0,0,0,.87);z-index:200;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:20px;}
.celebrate.on{display:flex;}
.celebrate h2{font-family:Impact,sans-serif;font-size:clamp(2.5rem,10vw,6rem);color:#ffd700;text-shadow:3px 3px 0 #e91e8c;animation:pulse .7s ease-in-out infinite alternate;letter-spacing:3px;}
@keyframes pulse{0%{transform:scale(1)}100%{transform:scale(1.07)}}
.celebrate p{font-size:clamp(1rem,3.5vw,1.8rem);color:#fff;margin-top:14px;}
.fscore{font-family:Impact,sans-serif;font-size:clamp(1.8rem,5vw,3rem);color:#4caf50;margin-top:10px;}
.confetti-wrap{position:fixed;inset:0;pointer-events:none;z-index:201;overflow:hidden;}
.cp{position:absolute;animation:cffall linear forwards;}
@keyframes cffall{0%{transform:translateY(-20px) rotate(0deg);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:.2}}
@media(max-width:420px){.head{width:88px;height:88px;}.hole-ring{width:92px;height:38px;}.grid{gap:8px;}}
</style>
</head>
<body>
<div class="hearts-bg" id="hbg"></div>
<div class="wrap">
  <h1 class="title">&#128157; WHACK-A-FAMILY &#128157;</h1>
  <div class="subtitle">Smack &#39;em back into their holes! &#128296;</div>
  <div class="scoreboard">
    <div class="sc"><div class="sc-lbl">Score</div><div class="sc-val" id="scoreEl">0</div></div>

  </div>
  <div class="legend" id="legEl"></div>
  <div class="controls">
    <button class="btn btn-go" id="startBtn" onclick="startGame()">&#128296; START!</button>
    <button class="btn btn-re" onclick="resetGame()">&#128260; RESET</button>
  </div>
  <div class="grass">&#127800;&#127802;&#127800;&#127803;&#127800;&#127802;&#127800;</div>
  <div class="grid" id="grid"></div>
  <div class="grass">&#127807;&#127808;&#127807;&#127808;&#127807;&#127808;</div>
</div>
<div class="celebrate" id="cel">
  <div class="confetti-wrap" id="cfWrap"></div>
  <div style="font-size:4rem">&#128157;</div>
  <h2>HAPPY MOTHER&#39;S DAY!!!</h2>
  <p>You smacked your way to $100,000!</p>
  <div class="fscore" id="fscore"></div>
  <p style="margin-top:20px;font-size:1.4rem">World&#39;s Greatest Mom! &#128081;</p>
  <button class="btn btn-go" style="margin-top:24px" onclick="resetGame()">&#127918; Play Again</button>
</div>

var HOLES=6,score=0,active=false,timeLeft=60,timerInt=null,spawnTO=null,headTimers={};
function buildLegend(){var el=document.getElementById('legEl');FACES.forEach(function(f){var d=document.createElement('div');d.className='leg';d.innerHTML='<div class="leg-dot"><img src="'+f.img+'"/></div>'+f.label+' = <strong>$'+f.pts+'</strong>';el.appendChild(d);});}
function buildGrid(){var g=document.getElementById('grid');g.innerHTML='';for(var i=0;i<HOLES;i++){(function(idx){var c=document.createElement('div');c.className='hole-c';var fl=document.createElement('div');fl.className='flash';fl.id='fl'+idx;var hw=document.createElement('div');hw.className='head gone';hw.id='hw'+idx;hw.innerHTML='<img src="" alt=""/><div class="badge">$0</div>';hw.addEventListener('touchstart',function(e){e.preventDefault();whack(idx);},{passive:false});hw.addEventListener('mousedown',function(e){e.preventDefault();whack(idx);});var hr=document.createElement('div');hr.className='hole-ring';hr.innerHTML='<div class="hole-inner"></div>';var hs=document.createElement('div');hs.className='hole-shadow';c.appendChild(fl);c.appendChild(hw);c.appendChild(hr);c.appendChild(hs);g.appendChild(c);})(i);}}
function showHead(idx){if(!active)return;var hw=document.getElementById('hw'+idx);if(!hw||!hw.classList.contains('gone'))return;var face=FACES[Math.floor(Math.random()*FACES.length)];hw.querySelector('img').src=face.img;hw.querySelector('.badge').textContent='$'+face.pts;hw.dataset.pts=face.pts;hw.classList.remove('gone','smacked');hw.classList.add('up');var dur=Math.max(750,1700-Math.floor(score/300)*15);headTimers[idx]=setTimeout(function(){hideHead(idx,false);},dur);}
function hideHead(idx,smacked){clearTimeout(headTimers[idx]);delete headTimers[idx];var hw=document.getElementById('hw'+idx);if(!hw)return;if(smacked){hw.classList.remove('up');hw.classList.add('smacked');setTimeout(function(){hw.classList.add('gone');hw.classList.remove('smacked','up');},380);}else{hw.classList.add('gone');hw.classList.remove('up','smacked');}}
function whack(idx){if(!active)return;var hw=document.getElementById('hw'+idx);if(!hw||hw.classList.contains('gone')||hw.classList.contains('smacked'))return;var pts=parseInt(hw.dataset.pts)||0;score+=pts;updateDisplay();showFlash(idx,pts);hideHead(idx,true);if(score>=100000){triggerWin();}}
function showFlash(idx,pts){var fl=document.getElementById('fl'+idx);fl.textContent='+$'+pts;fl.classList.remove('pop');void fl.offsetWidth;fl.classList.add('pop');setTimeout(function(){fl.classList.remove('pop');},600);}
function updateDisplay(){document.getElementById('scoreEl').textContent=score.toLocaleString();document.getElementById('moneyEl').textContent='$'+score.toLocaleString()+'.00';}
function spawnLoop(){if(!active)return;var avail=[];for(var i=0;i<HOLES;i++){var hw=document.getElementById('hw'+i);if(hw&&hw.classList.contains('gone'))avail.push(i);}if(avail.length){showHead(avail[Math.floor(Math.random()*avail.length)]);}spawnTO=setTimeout(spawnLoop,Math.max(280,680-Math.floor(score/600)*18));}
function startGame(){if(active)return;resetGame(false);active=true;document.getElementById('startBtn').textContent='PLAYING!';document.getElementById('startBtn').disabled=true;spawnLoop();timeLeft=60;timerInt=setInterval(function(){timeLeft--;document.getElementById('timerEl').textContent=timeLeft;if(timeLeft<=0){endGame();}},1000);}
function endGame(){active=false;clearInterval(timerInt);clearTimeout(spawnTO);for(var i=0;i<HOLES;i++)hideHead(i,false);if(score>=100000){triggerWin();return;}document.getElementById('startBtn').textContent='PLAY AGAIN!';document.getElementById('startBtn').disabled=false;}
function triggerWin(){active=false;clearInterval(timerInt);clearTimeout(spawnTO);document.getElementById('fscore').textContent='Final: $'+score.toLocaleString()+'.00';document.getElementById('cel').classList.add('on');launchConfetti();}
function launchConfetti(){var w=document.getElementById('cfWrap');w.innerHTML='';var c=['#ffd700','#ff6b9d','#6bcb77','#4d96ff','#ff8e53','#e91e8c','#fff'];for(var i=0;i<70;i++){var p=document.createElement('div');p.className='cp';p.style.width='10px';p.style.height='10px';p.style.background=c[Math.floor(Math.random()*c.length)];p.style.borderRadius=Math.random()>.5?'50%':'2px';p.style.left=(Math.random()*100)+'vw';p.style.top='-20px';p.style.animation='cffall '+(2+Math.random()*3)+'s '+(Math.random()*2)+'s ease-in forwards';w.appendChild(p);}setTimeout(launchConfetti,3500);}
function resetGame(full){if(full===undefined)full=true;active=false;clearInterval(timerInt);clearTimeout(spawnTO);for(var i=0;i<HOLES;i++){clearTimeout(headTimers[i]);delete headTimers[i];var hw=document.getElementById('hw'+i);if(hw)hw.className='head gone';}if(full){score=0;timeLeft=60;updateDisplay();document.getElementById('timerEl').textContent='60';document.getElementById('cel').classList.remove('on');document.getElementById('cfWrap').innerHTML='';document.getElementById('startBtn').textContent='START!';document.getElementById('startBtn').disabled=false;}}
function spawnHearts(){var bg=document.getElementById('hbg');var glyphs=['&#10084;','&#127800;','&#10024;','&#128157;','&#127802;','&#9829;','&#127807;'];for(var i=0;i<14;i++){var el=document.createElement('div');el.className='heart-float';el.innerHTML=glyphs[Math.floor(Math.random()*glyphs.length)];el.style.left=(Math.random()*100)+'vw';el.style.fontSize=(1+Math.random()*1.8)+'rem';el.style.animationDuration=(7+Math.random()*9)+'s';el.style.animationDelay=(Math.random()*12)+'s';bg.appendChild(el);}}
buildLegend();buildGrid();spawnHearts();
</script>
